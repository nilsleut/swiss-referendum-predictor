name: Deploy to Cloud Run

on:
  push:
    branches: [main, master]

env:
  PROJECT_ID:  ${{ secrets.GCP_PROJECT_ID }}
  REGION:      europe-west6          # Zurich — closest to Switzerland
  AR_REPO:     swiss-referendum      # Artifact Registry repo name
  API_SERVICE: referendum-api
  FE_SERVICE:  referendum-frontend

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    if: ${{ secrets.GCP_PROJECT_ID != '' }}
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # ── Auth ─────────────────────────────────────────────────────────────
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account:            ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Build & push API ──────────────────────────────────────────────────
      - name: Build API image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/api:${{ github.sha }} ./api

      - name: Push API image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/api:${{ github.sha }}

      # ── Build & push Frontend ─────────────────────────────────────────────
      - name: Build Frontend image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }} ./frontend

      - name: Push Frontend image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }}

      # ── Deploy API to Cloud Run ───────────────────────────────────────────
      - name: Deploy API
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/api:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=3000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},MODEL_VERSION=v1.0.0,LOG_PRETTY=false" \
            --set-secrets="ONNX_MODEL_DIR=onnx-model-dir:latest"

      # ── Deploy Frontend to Cloud Run ──────────────────────────────────────
      - name: Deploy Frontend
        run: |
          API_URL=$(gcloud run services describe ${{ env.API_SERVICE }} \
            --region=${{ env.REGION }} --format='value(status.url)')
          gcloud run deploy ${{ env.FE_SERVICE }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=80 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2

      - name: Print service URLs
        run: |
          echo "API:      $(gcloud run services describe ${{ env.API_SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')"
          echo "Frontend: $(gcloud run services describe ${{ env.FE_SERVICE }}  --region=${{ env.REGION }} --format='value(status.url)')"
